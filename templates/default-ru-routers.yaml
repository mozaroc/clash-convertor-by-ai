log-level: silent # уровень предупреждений в журнале событий
tproxy-port: 7894 # порт прозрачного прокси
external-controller: 0.0.0.0:9090 # адрес Dashboard панели Clash
external-ui: ./zash
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"

allow-lan: false
tcp-concurrent: true
enable-process: true
find-process-mode: always
mode: rule
ipv6: false
keep-alive-interval: 30
unified-delay: true
profile:
  store-selected: true
  store-fake-ip: true
  tracing: false
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443

#  skip-src-address:
#    - 192.168.1.1/32 # если нужно исключить конкретное устройство в вашей сети, пропишите его адрес с /32 на конце здесь
#  skip-dst-address:
#    - 192.168.1.1/32 # если нужно исключить конкретное устройство в вашей сети, пропишите его адрес с /32 на конце здесь

dns:
  enable: true
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  listen: 127.0.0.1:6868
  ipv6: false
  enhanced-mode: redir-host
  default-nameserver:
    - tls://77.88.8.8#DIRECT # Yandex DNS over TLS
    - 195.208.4.1#DIRECT # НСДИ
    - system
  proxy-server-nameserver:
    - tls://77.88.8.8#DIRECT # Yandex DNS over TLS
    - 195.208.4.1#DIRECT # НСДИ
    - system
  direct-nameserver:
    - tls://77.88.8.8#DIRECT # Yandex DNS over TLS
    - 195.208.4.1#DIRECT # НСДИ
    - system
  nameserver:
    - https://cloudflare-dns.com/dns-query#🌍 VPN
    - https://cloudflare-dns.com/dns-query

proxies:

proxy-groups:
  - name: 🌍 VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    include-all: true
    proxies:
      - ⚡️ AUTO
      # LEAVE THIS LINE!
  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    include-all: true
    proxies:
      - ⚡️ AUTO
      # LEAVE THIS LINE!
  - name: ⚡️ AUTO
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    url: https://captive.apple.com/generate_204
    hidden: true
    interval: 300
    include-all: true
    proxies:
      # LEAVE THIS LINE!
  - name: 🔓 NO VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Blackhole.png
    type: select
    hidden: true
    proxies:
      - DIRECT

