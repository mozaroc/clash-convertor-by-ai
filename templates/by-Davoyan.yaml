mixed-port: 7890
allow-lan: true
lan-allowed-ips: # Разрешенные ip для подключения к lan
  - 0.0.0.0/8
  - 10.0.0.0/8
  - 100.64.0.0/10
  - 127.0.0.0/8
  - 169.254.0.0/16
  - 172.16.0.0/12
  - 192.0.0.0/24
  - 192.0.2.0/24
  - 192.88.99.0/24
  - 192.168.0.0/16
  - 198.18.0.0/15
  - 198.51.100.0/24
  - 203.0.113.0/24
  - 224.0.0.0/3
  - ::/127
  - fc00::/7
  - fe80::/10
  - ff00::/8
tcp-concurrent: true
enable-process: true
find-process-mode: always
mode: rule
log-level: info
ipv6: false # true - если используйте ipv6
bind-address: "*"
keep-alive-interval: 30
unified-delay: false

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: 
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    # Для VLESS REALITY не имеет смысла, так как всё равно делаем REJECT в rules. В противном случае, используем.
    #QUIC:
    #  ports:
    #    - 443
    
  skip-dst-address: # Пропуск перехвата для целевых IP
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/3
    - ::/127
    - fc00::/7
    - fe80::/10
    - ff00::/8

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  route-exclude-address:
    - 127.0.0.0/8
    - ::1/128

dns:
  enable: true
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  ipv6: false #true - если хотите резолвить в ipv6
  enhanced-mode: redir-host
  # ----
  # Опционально выбираем DNS сервера. На ваш выбор с большим запасом, на случай недоступности
  default-nameserver:
    # DNS для доменов DNS серверов
    - tls://1.1.1.1#🎲 Любой доступный сервер
    - https://94.140.14.14/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
    #- https://9.9.9.9/dns-query#DIRECT
    #- https://1.1.1.1/dns-query#DIRECT
    #- https://1.0.0.1/dns-query#DIRECT
    #- https://208.67.222.222/dns-query#DIRECT
    #- https://208.67.220.220/dns-query#DIRECT
    #- https://77.88.8.8/dns-query#DIRECT
  proxy-server-nameserver:
    # DNS для доменов прокси из раздела proxies
    - tls://1.1.1.1#🎲 Любой доступный сервер
    - https://94.140.14.14/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
    #- https://8.8.4.4/dns-query#DIRECT
    #- https://208.67.222.222/dns-query#DIRECT
    #- https://208.67.220.220/dns-query#DIRECT
    #- https://9.9.9.9/dns-query#DIRECT
    #- https://1.1.1.1/dns-query#DIRECT
    #- https://1.0.0.1/dns-query#DIRECT
    #- https://dns.opendns.com/dns-query#DIRECT
    #- https://doh.sb/dns-query#DIRECT
    #- https://doh.mullvad.net/dns-query#DIRECT
    #- https://dns.nextdns.io/dns-query#DIRECT
    #- https://doh.libredns.gr/dns-query#DIRECT
    #- https://cloudflare-dns.com/dns-query#DIRECT
  direct-nameserver:
    # DNS для сайтов идущих через DIRECT
    - 77.88.8.8#DIRECT # Yandex DNS
    - 77.88.8.1#DIRECT # Yandex DNS
    - 8.8.8.8#DIRECT # Google DNS
  nameserver:
    # Сервер по умолчанию, в данном случае используется для доменов, идущих через прокси
    - tls://94.140.14.14#🚫 Недоступные сайты
    - tls://94.140.14.14#🎲 Любой доступный сервер
    - tls://94.140.15.15#🎲 Любой доступный сервер
    
proxies:

proxy-groups:
  - name: 🚫 Недоступные сайты
    icon: https://raw.githubusercontent.com/remnawave/templates/refs/heads/main/icons/Blocked.png
    type: select
    include-all: true
    proxies:
      - 🎲 Любой доступный сервер
      - 🇷🇺 Без VPN # Опционально

  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    include-all: true
    proxies:
      - 🚫 Недоступные сайты

  - name: 💬 Discord
    icon: https://raw.githubusercontent.com/remnawave/templates/refs/heads/main/icons/Discord.png
    type: select
    include-all: true
    proxies:
      - 🚫 Недоступные сайты

  - name: ➤ Telegram
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: select
    include-all: true
    proxies:
      - 🚫 Недоступные сайты
      - 🇷🇺 Без VPN

  - name: 🟠 Cloudflare
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cloudflare.png
    type: select
    include-all: true
    proxies:
      - 🇷🇺 Без VPN
      - 🚫 Недоступные сайты

  - name: ⚪🔵🔴 RU сайты
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Russia.png
    type: select
    proxies:
      - 🇷🇺 Без VPN

  - name: 🌍 Остальные сайты
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    type: select
    include-all: true
    proxies:
      - 🇷🇺 Без VPN
      - 🚫 Недоступные сайты

  - name: PROXY
    type: select
    include-all: true
    hidden: true
    proxies:
      - 🚫 Недоступные сайты

  - name: 🎲 Любой доступный сервер
    type: fallback
    include-all: true
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    hidden: true
    lazy: true

  - name: 🇷🇺 Без VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Blackhole.png
    type: select
    hidden: true
    proxies:
      - DIRECT

